# QLoRA fine-tuning configuration for Qwen3-8B
# Target: RTX 5060 Ti (16 GB VRAM)
# Estimated VRAM usage: ~10 GB
# Estimated training time: ~8-10 hours

model:
  name: unsloth/Qwen2.5-7B-Instruct-bnb-4bit
  quantization: 4bit       # NF4 via bitsandbytes
  max_seq_length: 1024
  dtype: float16

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 16   # effective batch size = 32
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  fp16: false
  bf16: true
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: steps
  eval_steps: 200
  seed: 42

data:
  train_path: dataset/splits/train.jsonl
  val_path: dataset/splits/val.jsonl
  max_seq_length: 1024

output:
  dir: checkpoints/qwen3-8b-bangla-support
  hub_model_id: mrshibly/bangla-support-qwen3-8b
